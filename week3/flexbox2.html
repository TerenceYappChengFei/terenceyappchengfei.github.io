<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .menu_container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu_item {
            font-size: 16px;
            margin: 20px;
            cursor: pointer;
        }

        .navbar {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            /*background-color: brown; */
        }

        .header {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            margin: 0px 100px 0px 100px;
            gap: 200px;
            /background-color: lightblue;/
        }

        .header_item {
            margin: 50px;
            /background-color: green;/
        }

        .logos {
            /*background-color: lightsalmon;*/
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
            justify-content: space-evenly;
            margin: 30px;
            filter: grayscale(100%)
        }
    </style>
</head>

<body>
    <!--Navbar-->
    <div class="navbar">
        <div>
            <div class="navbar_item">
                <h1 class="navbar_item"><img style="margin-right: 10px;" width="25px" src="images/Icon.png"
                        alt="Positivus Logo">Positivus</h1>
            </div>

        </div>
        <div class="menu_container">
            <div class="menu_item">About us</div>
            <div class="menu_item">Services</div>
            <div class="menu_item">Use Cases</div>
            <div class="menu_item">Pricing</div>
            <div class="menu_item">Blog</div>
            <div>
                <button
                    style="background-color: white ;border: 2px solid gray; padding: 18px 30px 18px 30px; border-radius: 5px; font-size: 16px;">
                    Request a quote
                </button>
            </div>
        </div>
    </div>

    <div>
        <!--Header-->
        <div class="header">
            <div class="header_text">
                <div class="header_item">
                    <h1>Navigating the digital landscape for success</h1>
                </div>
                <div class="header_item">
                    <p>Our digital marketing agency helps business grow and succeed online through a range of services
                        including
                        SEO, PPC, and social media marketing, and content creation.</p>
                </div>
                <div class="header_item">
                    <button
                        style="background-color: #191a23 ; color: white; padding: 18px 30px 18px 30px; border-radius: 5px; font-size: 16px;">
                        Book a consultation
                    </button>
                </div>
            </div>
            <div class="header_illust">
                <img width="500px" src="images/illustration.png" alt="Positivus Header Image">
            </div>
        </div>

        <!--Logos-->
        <div class="logos">
            <img width="100px" src="images/amazon.png" alt="Logo 1">
            <img width="100px" src="images/dribbble.png" alt="Logo 1">
            <img width="100px" src="images/hubspot.png" alt="Logo 1">
            <img width="100px" src="images/notion.png" alt="Logo 1">
            <img width="100px" src="images/netflix.png" alt="Logo 1">
            <img width="100px" src="images/zoom.png" alt="Logo 1">

        </div>
    </div>
</body>

</html>
