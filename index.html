<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index.html</title>

    <style>
        body {
            background-image: url(index_img/BG.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            margin: 0px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;

        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            background-color: #E2E8CE;
            padding: 5px;
        }

        /* Logo */
        .logo img {
            margin: 5px;
            width: 50px;
        }

        /* socials */
        .socials {
            display: flex;
        }

        .socials img {
            /* removes gap */
            display: block;
            margin: 5px;
            width: 30px;
            border-radius: 5px;
        }

        .content {
            display: flex;
            flex: 1;
            flex-direction: column;
            color: white;
        }

        .info {
            display: flex;
            flex-direction: column;
            align-items: center;

        }

        .footer {
            background-color: #E2E8CE;
        }

        .assignments_container {
            display: flex;
        }

        .week {
            background-color: #ACBFA4;
        }
    </style>
</head>

<body>


    <!-- Header -->
    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="index_img/aries.png" alt="logo"></a>
        </div>
        <div class="socials">
            <a href="https://www.instagram.com/yappanalogy/"><img src="index_img/instalogo.jpg"
                    alt="instagram logo"></a>
            <a href="https://red-note.co/explore"><img src="index_img/rednotelogo.jpg" alt="rednote logo"></a>
            <a href="https://www.tiktok.com/"><img src="index_img/tiktoklogo.jpg" alt="tiktok logo"></a>
        </div>

    </div>

    <!-- Content -->
    <div class="content">
        <div class="info">
            <h2>Terence Yapp Cheng Fei</h2>
            <h3>Web Publishing</h3>
            <p>Hello! I'm Terence, a Digital Media student. I love music and creative writing. Welcome to my
                personal page!</p>
        </div>
        <div class="assignments_container">
            <div class="week">
                <h1>pppp</h1>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>adsadsa</p>
    </div>
</body>

</html>
